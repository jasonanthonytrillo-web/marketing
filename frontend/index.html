<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link id="manifest-link" rel="manifest" href="/manifest.json" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Brining home closer, One cup at a time" />
  <meta name="theme-color" content="#0a3d01" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hometownbrew.vercel.app/" />
  <meta property="og:title" content="HOMETOWN BREW" />
  <meta property="og:description" content="Brining home closer, One cup at a time" />
  <meta property="og:image" content="https://hometownbrew.vercel.app/favicon.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="HOMETOWN BREW" />
  <meta name="twitter:description" content="Brining home closer, One cup at a time" />
  <meta name="twitter:image" content="https://hometownbrew.vercel.app/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>Hometown Brew</title>
</head>

<body>
  <div id="root">
    <!-- Branded Splash Screen (visible until React mounts) -->
    <div id="splash-loader" style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a3d01;font-family:'Outfit',sans-serif;gap:24px;">
      <img src="/favicon.png" alt="Hometown Brew" style="width:96px;height:96px;border-radius:24px;animation:pulse-logo 2s ease-in-out infinite;box-shadow:0 0 60px rgba(255,255,255,0.15);" />
      <div style="text-align:center;">
        <h1 style="color:#fff;font-size:22px;font-weight:900;letter-spacing:-0.5px;margin:0;">Hometown Brew</h1>
        <p style="color:rgba(255,255,255,0.5);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin:6px 0 0;">Bringing home closer</p>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.7);animation:dot-bounce 1.4s ease-in-out infinite;"></span>
        <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.7);animation:dot-bounce 1.4s ease-in-out 0.2s infinite;"></span>
        <span style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.7);animation:dot-bounce 1.4s ease-in-out 0.4s infinite;"></span>
      </div>
    </div>
    <style>
      @keyframes pulse-logo { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.85} }
      @keyframes dot-bounce { 0%,80%,100%{transform:scale(0.4);opacity:0.3} 40%{transform:scale(1);opacity:1} }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
